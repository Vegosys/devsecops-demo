name: AI-Driven DevSecOps — Spec → Approve → Deploy

# FLOW:
#   1. A non-technical stakeholder uploads a plain-text brief
#      (requirements/*.txt) describing what they want, in plain English
#   2. 🤖 AI interprets it and generates a technical design DOC (docs/generated/DESIGN.md)
#   3. ✋ Pipeline PAUSES for human approval (design-approval environment)
#   4. 🤖 Once approved, AI WRITES THE CODE (codegen job) and commits it to main
#   5. ✅ The AI-enabled DevSecOps pipeline runs all gates against the fresh code,
#      builds the REAL .NET container, and deploys.
#
# ONE-TIME SETUP: Settings → Environments → create "design-approval"
# and add yourself as a Required reviewer. That is what makes step 3 pause.
# Also confirm Settings → Branches allows Actions to push directly to main
# (no required-PR protection), or the codegen job's push will be rejected.

on:
  push:
    branches: [main]
    paths: ['requirements/**', 'site/**']   # requirement or webpage change triggers it
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read

env:
  APP_NAME: loan-fulfillment-api
  IMAGE: registry.example.com/loan-fulfillment-api
  DOTNET_CONTEXT: src/DemoApi

jobs:
  # ===================== PHASE 0: AI REQUIREMENTS INTAKE =====================
  ai-design-doc:
    name: 🤖 AI Design Doc (from requirement)
    runs-on: ubuntu-latest
    outputs:
      req_file: ${{ steps.detect.outputs.req_file }}
      req_type: ${{ steps.detect.outputs.req_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect which requirement changed
        id: detect
        run: |
          # REAL: a real AI call would read the brief's actual text to decide type/content,
          # not just its filename.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "req_file=" >> "$GITHUB_OUTPUT"
            echo "req_type=none" >> "$GITHUB_OUTPUT"
          else
            FILE=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- requirements/ 2>/dev/null | tail -1)
            echo "req_file=$FILE" >> "$GITHUB_OUTPUT"
            case "$FILE" in
              *webpage*) echo "req_type=webpage" >> "$GITHUB_OUTPUT" ;;
              *api*)     echo "req_type=api" >> "$GITHUB_OUTPUT" ;;
              "")        echo "req_type=none" >> "$GITHUB_OUTPUT" ;;
              *)         echo "req_type=unknown" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - name: Generate design doc from the plain-text brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🤖 Claude reading the plain-language brief (${{ steps.detect.outputs.req_file }})..."
          python3 scripts/call_claude_design.py \
            --req-file "${{ steps.detect.outputs.req_file }}" \
            --req-type "${{ steps.detect.outputs.req_type }}"
          echo "✅ Design doc ready: docs/generated/DESIGN.md (status: AWAITING APPROVAL)"
          {
            echo "## 🤖 AI Design Doc — generated from a plain-text brief"
            echo "Source: \`${{ steps.detect.outputs.req_file || 'none (manual run)' }}\` (written by a non-technical stakeholder)"
            echo "Type: \`${{ steps.detect.outputs.req_type }}\`"
            echo "Output: \`docs/generated/DESIGN.md\` — **awaiting approval**"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish doc for reviewers
        uses: actions/upload-artifact@v4
        with:
          name: design-doc
          path: docs/generated/DESIGN.md

  # ===================== HUMAN APPROVAL GATE =====================
  await-approval:
    name: ✋ Approve Design
    runs-on: ubuntu-latest
    needs: ai-design-doc
    environment: design-approval        # required reviewers => pipeline pauses here
    steps:
      - run: |
          echo "✅ Design approved by ${{ github.actor }} — releasing the pipeline."
          echo "### ✋ Design Approval — ✅ approved, pipeline proceeding" >> "$GITHUB_STEP_SUMMARY"

  # ===================== 🤖 AI WRITES THE CODE (gated by approval) =====================
  codegen:
    name: 🤖 AI Codegen (write approved design)
    runs-on: ubuntu-latest
    needs: [ai-design-doc, await-approval]
    if: needs.ai-design-doc.outputs.req_type == 'webpage' || needs.ai-design-doc.outputs.req_type == 'api'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Download approved design doc
        uses: actions/download-artifact@v4
        with:
          name: design-doc
          path: artifacts/design-doc
      - name: AI codegen — write the approved design
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🤖 Claude writing code for requirement type: ${{ needs.ai-design-doc.outputs.req_type }} ..."
          python3 scripts/call_claude_codegen.py \
            --req-file "${{ needs.ai-design-doc.outputs.req_file }}" \
            --design-doc artifacts/design-doc/DESIGN.md \
            --req-type "${{ needs.ai-design-doc.outputs.req_type }}"
      - name: Commit and push generated code
        run: |
          git config user.name "ai-devsecops-bot"
          git config user.email "ai-devsecops-bot@users.noreply.github.com"
          git add site src/DemoApi
          if git diff --cached --quiet; then
            echo "No changes to commit (generated code already matches templates)."
          else
            git commit -m "🤖 AI codegen: apply ${{ needs.ai-design-doc.outputs.req_type }} template from ${{ needs.ai-design-doc.outputs.req_file }} [skip ci]"
            git push origin HEAD:main
          fi
          echo "### 🤖 AI Codegen — committed generated code" >> "$GITHUB_STEP_SUMMARY"

  # ===================== PHASE 1: SHIFT-LEFT SECURITY =====================
  secret-scan:
    name: 🔑 Secret Scan
    runs-on: ubuntu-latest
    needs: [await-approval, codegen]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          echo "Scanning for secrets..."; sleep 2; echo "✅ 0 secrets found"
          # REAL: uses: gitleaks/gitleaks-action@v2
          echo "### 🔑 Secret Scan — ✅ pass" >> "$GITHUB_STEP_SUMMARY"

  sast:
    name: 🧠 SAST
    runs-on: ubuntu-latest
    needs: [await-approval, codegen]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          echo "Static analysis of C# sources..."; sleep 3; echo "0 high · 2 low · ✅ pass"
          # REAL: github/codeql-action (csharp) or Semgrep
          echo "### 🧠 SAST — ✅ pass" >> "$GITHUB_STEP_SUMMARY"

  sca:
    name: 📦 SCA / Dependencies
    runs-on: ubuntu-latest
    needs: [await-approval, codegen]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          echo "Scanning NuGet packages for CVEs/licenses..."; sleep 2; echo "0 critical · ✅ pass"
          # REAL: dotnet list package --vulnerable  /  trivy fs .
          echo "### 📦 SCA — ✅ pass" >> "$GITHUB_STEP_SUMMARY"

  iac-scan:
    name: 🏗️ IaC Scan
    runs-on: ubuntu-latest
    needs: [await-approval, codegen]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          echo "Scanning Dockerfile / K8s manifests..."; sleep 2; echo "non-root OK · ✅ pass"
          # REAL: checkov / trivy config / hadolint
          echo "### 🏗️ IaC Scan — ✅ pass" >> "$GITHUB_STEP_SUMMARY"

  ai-code-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    needs: [await-approval, codegen]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          echo "🤖 Claude reviewing the diff..."; sleep 3
          echo "⚠️ 1 suggestion (validate amount upper bound) · 0 blocking"
          # REAL: Anthropic API on the PR diff
          echo "### 🤖 AI Code Review — ✅ 1 suggestion" >> "$GITHUB_STEP_SUMMARY"

  # ===================== HUMAN APPROVAL GATE (code review) =====================
  await-code-review:
    name: ✋ Approve Code Review
    runs-on: ubuntu-latest
    needs: ai-code-review
    environment: code-review-approval   # required reviewers => pipeline pauses here
    steps:
      - run: |
          echo "✅ Code review approved by ${{ github.actor }} — releasing the build."
          echo "### ✋ Code Review Approval — ✅ approved, pipeline proceeding" >> "$GITHUB_STEP_SUMMARY"

  ai-test-gen:
    name: 🤖 AI Test Generation
    runs-on: ubuntu-latest
    needs: [await-approval, codegen]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          echo "🤖 Generating xUnit tests for validation + health contract..."; sleep 3
          echo "✅ 6/6 generated tests pass · coverage 68%→89%"
          # REAL: Anthropic API generates tests, dotnet test
          echo "### 🤖 AI Test Generation — ✅ +6 tests" >> "$GITHUB_STEP_SUMMARY"

  # ===================== PHASE 2: BUILD (REAL .NET CONTAINER) =====================
  build:
    name: ⚙️ Build .NET Container
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sca, iac-scan, await-code-review]
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build the ASP.NET Core image (real)
        run: |
          docker build -t "$IMAGE:${{ steps.meta.outputs.tag }}" "$DOTNET_CONTEXT"
          echo "✅ Built real .NET 8 API image: $IMAGE:${{ steps.meta.outputs.tag }}"
          echo "### ⚙️ Build — ✅ real .NET container \`$IMAGE:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ===================== PHASE 3: ARTIFACT SECURITY =====================
  image-scan:
    name: 🛡️ Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: |
          echo "Scanning $IMAGE:${{ needs.build.outputs.tag }} ..."; sleep 2; echo "✅ clean"
          # REAL: uses: aquasecurity/trivy-action (image mode)
          echo "### 🛡️ Image Scan — ✅ clean" >> "$GITHUB_STEP_SUMMARY"

  sbom-sign:
    name: 🔏 SBOM + Sign
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: |
          echo "Syft SBOM + Cosign keyless sign..."; sleep 2; echo "✅ signed & attested"
          # REAL: syft ... && cosign sign --yes ...
          echo "### 🔏 SBOM + Sign — ✅ signed" >> "$GITHUB_STEP_SUMMARY"

  # ===================== PHASE 4: DAST =====================
  dast:
    name: 🌐 DAST
    runs-on: ubuntu-latest
    needs: [image-scan, sbom-sign]
    steps:
      - run: |
          echo "ZAP baseline against /health + /api/loans ..."; sleep 3; echo "0 high · ✅ pass"
          # REAL: uses: zaproxy/action-baseline
          echo "### 🌐 DAST — ✅ pass" >> "$GITHUB_STEP_SUMMARY"

  # ===================== 🤖 AI SECURITY TRIAGE (gate) =====================
  ai-triage:
    name: 🤖 AI Security Triage
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sca, iac-scan, image-scan, dast]
    steps:
      - run: |
          echo "🤖 Claude consolidating all findings..."; sleep 3
          echo "de-duped 1 · dismissed 2 false positives · 0 blocking · noise -75%"
          echo "✅ triage gate passed"
          # REAL: aggregated SARIF -> Anthropic API / DefectDojo triage
          echo "### 🤖 AI Security Triage — ✅ 0 blocking" >> "$GITHUB_STEP_SUMMARY"

  # ===================== PHASE 5: DEPLOY (real — GitHub Pages) =====================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: ai-triage
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: echo "🤖 AI release notes generated."
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - run: |
          echo ""
          echo "  ✅ DEPLOYED SUCCESSFULLY"
          echo "  app: todo-list-webpage"
          echo "  url: ${{ steps.deployment.outputs.page_url }}"
          {
            echo "## 🚀 Deploy — ✅ SUCCESS"
            echo "| Field | Value |"; echo "|---|---|"
            echo "| App | \`todo-list-webpage\` |"
            echo "| URL | ${{ steps.deployment.outputs.page_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===================== 🤖 AIOps + REPORT =====================
  ai-anomaly:
    name: 🤖 AI Anomaly Watch
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - run: |
          echo "🤖 Watching golden signals post-deploy..."; sleep 3; echo "✅ stable · no rollback"
          echo "### 🤖 AI Anomaly Watch — ✅ stable" >> "$GITHUB_STEP_SUMMARY"

  report:
    name: 📊 Pipeline Report
    runs-on: ubuntu-latest
    needs: [deploy, ai-anomaly]
    if: always()
    steps:
      - run: |
          {
            echo "## 📊 AI-Driven DevSecOps — Summary"
            echo "| Stage | Type | Result |"
            echo "|---|---|---|"
            echo "| AI design doc | 🤖 AI | ✅ |"
            echo "| Design approval | ✋ Human | ✅ |"
            echo "| AI codegen | 🤖 AI | ✅ |"
            echo "| Secret / SAST / SCA / IaC | DevSecOps | ✅ |"
            echo "| AI code review / test gen | 🤖 AI | ✅ |"
            echo "| Code review approval | ✋ Human | ✅ |"
            echo "| Build .NET container | DevSecOps | ✅ |"
            echo "| Image scan / SBOM+Sign / DAST | DevSecOps | ✅ |"
            echo "| AI security triage | 🤖 AI | ✅ |"
            echo "| Deploy | DevSecOps | ✅ |"
            echo "| AI anomaly watch | 🤖 AI | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Spec → Approve → Deploy complete."
