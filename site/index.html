<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-emoji">📝</span>
        <div class="brand-text">
          <div class="org-title">Jackson Group</div>
          <h1 class="brand-title">Todo List</h1>
        </div>
      </div>
      <div class="topbar-right">
        <div id="clock" class="clock" aria-live="polite"></div>
        <div class="theme-toggle" role="group" aria-label="Theme selection">
          <button type="button" class="theme-btn" data-theme-choice="light" title="Light mode">☀️</button>
          <button type="button" class="theme-btn" data-theme-choice="dark" title="Dark mode">🌙</button>
          <button type="button" class="theme-btn" data-theme-choice="system" title="System default">🖥️</button>
        </div>
      </div>
    </header>

    <section class="banner">
      <div class="banner-shape shape1"></div>
      <div class="banner-shape shape2"></div>
      <div class="banner-content">
        <span class="banner-emoji">✅🗂️🚀</span>
        <p>Stay on top of your day, one task at a time.</p>
      </div>
    </section>

    <main class="card">
      <div class="content-grid">
        <div class="todo-column">
          <div class="selected-date-bar">
            <span id="selected-date-label" class="selected-date-label"></span>
            <button type="button" id="jump-today-btn" class="today-btn">Today</button>
          </div>

          <form id="task-form" class="task-form" autocomplete="off">
            <input
              type="text"
              id="task-input"
              class="task-input"
              placeholder="What needs to be done?"
              maxlength="200"
              required
            >
            <button type="submit" class="add-btn">➕ Add</button>
          </form>

          <ul id="task-list" class="task-list"></ul>

          <div id="empty-state" class="empty-state">
            <div class="empty-emoji">🌤️📋</div>
            <p>No tasks for this date yet. Add one above to get started!</p>
          </div>
        </div>

        <aside class="calendar-panel" aria-label="Monthly calendar">
          <div class="calendar-header">
            <button type="button" id="cal-prev" class="cal-nav-btn" title="Previous month">‹</button>
            <div id="cal-month-label" class="cal-month-label"></div>
            <button type="button" id="cal-next" class="cal-nav-btn" title="Next month">›</button>
          </div>
          <div class="calendar-weekdays" id="calendar-weekdays"></div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </aside>
      </div>
    </main>

    <footer class="footer">
      <p>Everything is saved right in your browser. No account, no server. 🔒</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
