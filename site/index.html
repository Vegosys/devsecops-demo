<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <svg class="decor-icon" width="44" height="44" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="6" y="6" width="52" height="52" rx="12" fill="#4f46e5"/>
        <path d="M18 33l9 9 19-19" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1 class="title">Todo List</h1>
    </div>
    <div id="clock" class="clock" aria-live="polite"></div>
  </header>

  <div class="banner">
    <svg viewBox="0 0 600 100" width="100%" height="90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="bannerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="50%" stop-color="#8b5cf6"/>
          <stop offset="100%" stop-color="#ec4899"/>
        </linearGradient>
      </defs>
      <rect width="600" height="100" fill="url(#bannerGrad)"/>
      <circle cx="60" cy="50" r="22" fill="#ffffff" opacity="0.25"/>
      <circle cx="540" cy="30" r="16" fill="#ffffff" opacity="0.2"/>
      <circle cx="300" cy="70" r="30" fill="#ffffff" opacity="0.15"/>
      <text x="300" y="58" text-anchor="middle" font-size="26" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold">Stay Organized ✓</text>
    </svg>
  </div>

  <main class="container">
    <form id="task-form" class="task-form">
      <input
        type="text"
        id="task-input"
        class="task-input"
        placeholder="What needs to be done?"
        autocomplete="off"
        aria-label="New task"
      >
      <button type="submit" class="btn btn-add">Add</button>
    </form>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-state" class="empty-state">No tasks yet. Add one above to get started! 🎉</p>
  </main>

  <footer class="app-footer">
    <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="32" cy="32" r="30" fill="#f59e0b"/>
      <path d="M20 34c4 6 20 6 24 0" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="23" cy="24" r="4" fill="#fff"/>
      <circle cx="41" cy="24" r="4" fill="#fff"/>
    </svg>
    <span>Built for the demo — everything is saved right in your browser.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
